[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"

# Handle static assets properly
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-DNS-Prefetch-Control = "on"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"

# Redirections pour le SEO
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/accueil"
  to = "/"
  status = 301

[[redirects]]
  from = "/club"
  to = "/"
  status = 301

[[redirects]]
  from = "/parkour"
  to = "/"
  status = 301

# Redirection des anciennes URLs vers les nouvelles
[[redirects]]
  from = "/tshirt"
  to = "/boutique/tshirt"
  status = 301

[[redirects]]
  from = "/inscriptions"
  to = "/inscription"
  status = 301

# Configuration des fonctions
[functions]
  directory = "netlify/functions"

# Compression et optimisation (Désactivé pour Next.js car déjà géré par Next)
[build.processing]
  skip_processing = true

# Configuration du scan des secrets pour éviter les faux positifs sur les variables publiques
[secrets_scanning]
  enabled = true
  omit_keys = [
    "NEXT_PUBLIC_SITE_URL",
    "NEXT_PUBLIC_SITE_NAME", 
    "NEXT_PUBLIC_CONTACT_EMAIL",
    "NEXT_PUBLIC_CONTACT_PHONE",
    "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY",
    "NEXT_PUBLIC_EMAILJS_SERVICE_ID",
    "NEXT_PUBLIC_EMAILJS_TEMPLATE_ID",
    "NEXT_PUBLIC_EMAILJS_PUBLIC_KEY",
    "RESEND_API_KEY",
    "RESEND_FROM_EMAIL",
    "NEXT_PUBLIC_FORMSPREE_CONTACT_FORM_ID",
    "NEXT_PUBLIC_FORMSPREE_REGISTRATION_FORM_ID",
    "NEXT_PUBLIC_FORMSPREE_ORDER_FORM_ID"
  ]
  omit_paths = [
    ".next/**",
    "node_modules/**",
    ".netlify/**",
    "**/*.pack",
    "**/*.js",
    "**/*.html",
    "**/*.rsc",
    "**/cache/**",
    "**/webpack/**",
    "**/static/**",
    "**/server/**",
    "**/standalone/**",
    "**/chunks/**",
    "**/blobs/**",
    "**/deploy/**"
  ]
